services:
  apache:
    image: httpd:2.4
    container_name: pw-apache
    depends_on:
      - php
    ports:
      - "8088:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf
    restart: unless-stopped
    networks:
      - pw-net

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: pw-php
    volumes:
      - ./app:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    restart: unless-stopped
    networks:
      - pw-net

  db:
    image: mysql:8.0
    container_name: pw-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - pw-net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pw-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=${MYSQL_USER}
      - PMA_PASSWORD=${MYSQL_PASSWORD}
    depends_on:
      - db
    networks:
      - pw-net

networks:
  pw-net:
    driver: bridge
